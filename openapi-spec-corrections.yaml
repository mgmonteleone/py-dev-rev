# DevRev OpenAPI Spec Corrections
# Based on actual API responses observed during integration testing
# Date: 2026-01-18
# API Version: PUBLIC (https://api.devrev.ai)
#
# This file documents the corrections needed to the DevRev OpenAPI specification
# to match the actual API behavior.

openapi: 3.0.3
info:
  title: DevRev API - Spec Corrections
  description: |
    Corrections to the DevRev OpenAPI specification based on actual API responses.
    
    These corrections were discovered through comprehensive integration testing
    against the live DevRev PUBLIC API. The discrepancies cause validation errors
    in client SDKs that rely on the OpenAPI spec for model generation.
    
    **Testing Methodology**:
    - Tested against PUBLIC API (https://api.devrev.ai)
    - 16 read-only endpoints tested
    - Real API responses captured and validated
    - Pydantic models used for validation
    
    **Impact**: These issues affect any SDK or client that generates models from
    the OpenAPI spec, causing validation errors when parsing actual API responses.
  version: corrections-2026-01-18
  contact:
    name: Python SDK Maintainer
    url: https://github.com/mgmonteleone/py-dev-rev

components:
  schemas:
    # ============================================================================
    # CORRECTION #1: TagWithValue.tag Field Type
    # ============================================================================
    # 
    # Issue: OpenAPI spec defines 'tag' as a string, but API returns full Tag object
    # Affected Endpoints: accounts.list, accounts.export, works.list, works.export
    # Severity: CRITICAL - Breaks SDK validation
    # 
    # Current (INCORRECT):
    #   TagWithValue:
    #     properties:
    #       tag:
    #         type: string
    #         description: Tag name or ID
    # 
    # Corrected (CORRECT):
    TagWithValue:
      type: object
      description: |
        Tag with optional value for resource tagging.
        
        **Important**: The 'tag' field behaves differently in requests vs responses:
        - In requests: Can be a string (tag ID)
        - In responses: Returns a full Tag object with all fields
      required:
        - tag
      properties:
        tag:
          oneOf:
            - type: string
              description: Tag ID (when used in request payloads)
              example: "TAG:dvrv-us-1:devo/abc123:tag/1"
            - $ref: '#/components/schemas/Tag'
          description: |
            Tag reference - can be either a tag ID string or a full Tag object.
            
            **In API Responses** (list, export endpoints): Returns full Tag object
            **In API Requests** (create, update endpoints): Accepts tag ID string
        value:
          type: string
          nullable: true
          description: Optional value associated with the tag
          example: "production"
      example:
        tag:
          id: "TAG:dvrv-us-1:devo/abc123:tag/6"
          display_id: "TAG-6"
          name: "SalesforceService import"
          description: "item imported from external source"
          color: "#AAF0BD"
        value: null

    # ============================================================================
    # CORRECTION #2: Article.authored_by Field Type
    # ============================================================================
    # 
    # Issue: OpenAPI spec defines 'authored_by' as single UserSummary, but API returns array
    # Affected Endpoints: articles.list
    # Severity: CRITICAL - Breaks SDK validation
    # 
    # Current (INCORRECT):
    #   Article:
    #     properties:
    #       authored_by:
    #         $ref: '#/components/schemas/UserSummary'
    # 
    # Corrected (CORRECT):
    Article:
      type: object
      description: Knowledge base article
      required:
        - id
        - title
      properties:
        id:
          type: string
          description: Article ID
          example: "don:core:dvrv-us-1:devo/abc123:article/1"
        display_id:
          type: string
          nullable: true
          description: Human-readable display ID
          example: "ART-1"
        title:
          type: string
          description: Article title
          example: "Getting Started Guide"
        content:
          type: string
          nullable: true
          description: Article content in markdown or HTML
        status:
          type: string
          enum: [draft, published, archived]
          nullable: true
          description: Article publication status
        authored_by:
          type: array
          items:
            $ref: '#/components/schemas/UserSummary'
          nullable: true
          description: |
            List of article authors.
            
            **Note**: API returns an array, not a single UserSummary object.
            Articles can have multiple authors.
          example:
            - type: "sys_user"
              display_id: "DEVU-1"
              id: "don:identity:dvrv-us-1:devo/abc123:devu/1"
              state: "active"
        created_date:
          type: string
          format: date-time
          nullable: true
          description: Article creation timestamp
        modified_date:
          type: string
          format: date-time
          nullable: true
          description: Last modification timestamp

    # ============================================================================
    # Reference Schemas (for completeness)
    # ============================================================================
    
    Tag:
      type: object
      description: Tag for categorizing and organizing resources
      required:
        - id
        - name
      properties:
        id:
          type: string
          description: Unique tag identifier
          example: "TAG:dvrv-us-1:devo/abc123:tag/6"
        display_id:
          type: string
          nullable: true
          description: Human-readable tag ID
          example: "TAG-6"
        name:
          type: string
          description: Tag name
          example: "SalesforceService import"
        description:
          type: string
          nullable: true
          description: Tag description
          example: "item imported from external source in a specific import unit"
        color:
          type: string
          nullable: true
          description: Tag color in hex format
          example: "#AAF0BD"
        created_date:
          type: string
          format: date-time
          nullable: true
        modified_date:
          type: string
          format: date-time
          nullable: true

    UserSummary:
      type: object
      description: Summary of a user (dev user or rev user)
      required:
        - id
      properties:
        id:
          type: string
          description: User ID
        display_id:
          type: string
          nullable: true
          description: Human-readable user ID
        type:
          type: string
          enum: [sys_user, dev_user, rev_user]
          nullable: true
          description: User type
        state:
          type: string
          enum: [active, inactive, deleted]
          nullable: true
          description: User state

    # ============================================================================
    # CORRECTION #3: /works.list sort_by syntax (CUSS-451)
    # ============================================================================
    #
    # Issue: OpenAPI spec documents `sort_by` as an array of strings without
    #   specifying the accepted entry format. The live PUBLIC API rejects
    #   bare "-field" shortcuts and requires the canonical
    #   "field:asc" / "field:desc" form.
    #
    # Affected Endpoint: POST /works.list (and POST /works.export)
    # Severity: HIGH - Causes 4xx validation errors for any client that
    #   relies on the common "-field" descending shortcut.
    # Ticket: CUSS-451
    #
    # Observed server response for `sort_by: ["-modified_date"]`:
    #   400 Bad Request — "sort_by entries must be of the form
    #   'field:asc' or 'field:desc'"
    #
    # SDK Mitigation: `WorksService.list` / `WorksService.export` normalize
    #   `sort_by` entries before sending. Callers MAY continue to pass
    #   "-field" / "field" shortcuts; they are rewritten to
    #   "field:desc" / "field:asc" on the wire.
    #
    # Spec Correction (documentation-only — no schema change needed):
    WorksListSortByCorrection:
      type: array
      description: |
        Sort order for /works.list results.

        **Required format**: Each entry MUST be `"field:asc"` or
        `"field:desc"`. The server rejects bare `"-field"` and `"field"`
        shortcuts.

        **SDK behavior**: The Python SDK normalizes legacy shortcuts to the
        canonical form before sending, so callers may pass either format to
        `WorksService.list` / `WorksService.export`.
      items:
        type: string
        pattern: "^[a-zA-Z_][a-zA-Z0-9_.]*:(asc|desc)$"
        example: "modified_date:desc"
      example:
        - "modified_date:desc"
        - "created_date:asc"

    # ============================================================================
    # CORRECTION #4: /conversations.list sort_by syntax (CUSS-451)
    # ============================================================================
    #
    # Issue: Same as Correction #3 but on the conversations endpoint. The
    #   live PUBLIC API rejects bare "-field" entries on
    #   POST /conversations.list and requires "field:asc" / "field:desc".
    #
    # Affected Endpoint: POST /conversations.list
    # Severity: HIGH - Causes 4xx validation errors.
    # Ticket: CUSS-451
    #
    # SDK Mitigation: `ConversationsService.list` normalizes `sort_by`
    #   entries before sending.
    ConversationsListSortByCorrection:
      type: array
      description: |
        Sort order for /conversations.list results.

        **Required format**: Each entry MUST be `"field:asc"` or
        `"field:desc"`. Matches the corrected syntax documented for
        /works.list.
      items:
        type: string
        pattern: "^[a-zA-Z_][a-zA-Z0-9_.]*:(asc|desc)$"
        example: "modified_date:desc"
      example:
        - "modified_date:desc"

    # ============================================================================
    # CORRECTION #5: Time-windowed listing on /works.list and /conversations.list (CUSS-451)
    # ============================================================================
    #
    # Issue: The spec documents `modified_date` / `created_date` filters on
    #   /works.list and /conversations.list, but server-side filtering is
    #   not uniformly honored across all accounts. Observed behavior:
    #     - Some accounts return records older than the declared `after`
    #       cutoff when paginating results.
    #     - Sort order is honored reliably when `sort_by` uses the
    #       `field:direction` form (see Corrections #3 and #4).
    #
    # Affected Endpoints: POST /works.list, POST /conversations.list
    # Severity: MEDIUM - Does not break validation, but causes over-broad
    #   result sets for clients that rely on the server-side date filter.
    # Ticket: CUSS-451
    #
    # SDK Mitigation: `WorksService.list_modified_since`,
    #   `WorksService.list_created_since`, and
    #   `ConversationsService.list_modified_since` page server-side sorted
    #   `{timestamp_field}:desc` and apply a client-side early-exit as soon
    #   as a record older than the cutoff is seen. This guarantees the
    #   returned set is bounded by the cutoff regardless of server-side
    #   filter behavior.
    #
    # Documentation-only correction (no schema change):
    TimeWindowedListingCorrection:
      type: object
      description: |
        /works.list and /conversations.list support `modified_date` and
        (for works) `created_date` filters, but server-side honoring of
        these filters is inconsistent across accounts. Clients that need a
        strict time-window guarantee should sort by the timestamp field in
        descending order and early-exit on the first record older than the
        cutoff.
      properties:
        note:
          type: string
          example: "See SDK helpers list_modified_since / list_created_since."
